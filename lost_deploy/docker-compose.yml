services:
  db:
    image: mysql:8.4
    container_name: lostllm-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: lost_found
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -ppassword --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: lostllm-backend:latest
    container_name: lostllm-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: lost_found
      CORS_ORIGINS: '["http://localhost","http://127.0.0.1"]'
      PUBLIC_BASE_URL: http://localhost
      UPLOAD_DIR: uploads
    ports:
      - "8000:8000"
    volumes:
      - backend-uploads:/app/uploads

  frontend:
    image: lostllm-frontend:latest
    container_name: lostllm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db-data:
  backend-uploads: